name: Build and Publish to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push C++ Node
        uses: docker/build-push-action@v4
        with:
          context: ./node
          push: true
          tags: shiveksm/hydrahybridsocialprotocol:cpp-node

      - name: Build and push .NET API
        uses: docker/build-push-action@v4
        with:
          context: ./backend/Hydra.Api
          push: true
          tags: shiveksm/hydrahybridsocialprotocol:dotnet-api

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "shiveksm/doc"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          tags: "${{ secrets.DOCKER_USERNAME }}/docker-build-cloud-demo:latest"
          # For pull requests, export results to the build cache.
          # Otherwise, push to a registry.
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
  