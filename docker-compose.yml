version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hydra-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hydra-network

  redis:
    image: redis:alpine
    container_name: hydra-redis
    ports:
      - "6379:6379"
    networks:
      - hydra-network

  cpp-node:
    image: shiveksm/hydrahybridsocialprotocol:cpp-node
    container_name: hydra-cpp-node
    ports:
      - "8333:8333"
    volumes:
      - node_data:/app/data
    networks:
      - hydra-network

  dotnet-api:
    image: shiveksm/hydrahybridsocialprotocol:dotnet-api
    container_name: hydra-dotnet-api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017
      - ConnectionStrings__Redis=redis:6379
      - Blockchain__NodeHost=cpp-node
      - Blockchain__LedgerPath=/node-data/ledger.dat
    volumes:
      - node_data:/node-data:ro
    depends_on:
      - mongodb
      - redis
      - cpp-node
    networks:
      - hydra-network

networks:
  hydra-network:
    driver: bridge

volumes:
  mongo_data:
  node_data:
